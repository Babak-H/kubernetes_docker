apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-registry-1
  namespace: mddz
spec:
  selector:
    matchLabels:
      app: service-registry-1
  replicas: 1
  template:
    metadata:
      annotations:
        sidecar.istio.io/proxyCPU: 80m
        sidecar.istio.io/proxyCPULimit: 100m
        sidecar.istio.io/proxyMemory: 150Mi
        sidecar.istio.io/proxyMemoryLimit: 300Mi
        prometheus.io/scrape: "true"
        prometheus.io/port: "8761"
      labels:
        app: service-registry-1
        app.kubernetes.io/name: service-registry-1
        app.kubernetes.io/component: backend
    spec:
      terminationGracePeriodSeconds: 30
      serviceAccountName: service-registry-sa
      volumes:
        - name: peer1-logs
          persistentVolumeClaim:
            claimName: peer1-logs-claim
      imagePullSecrets:
        - name: my-reg-key
      securityContext:
        fsGroup: 10001
      containers:
      - name: service-registry-1
        image: registry.code.***.com/mddz/service-registry:1.0.0
        securityContext:
          runAsUser: 10000
          runAsGroup: 10001
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        ports:
        - containerPort: 8761
        imagePullPolicy: Always
        env:
        - name: INSTANCE
          value: peer1
        - name: INSTANCE_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
#        - name: SPRING_PROFILES_ACTIVE
#          value: "remote,dev,peer1"
#        - name: mddz_EUREKA_PEER1_HOST
#          value: service-registry-service-1
#        - name: mddz_EUREKA_PEER2_HOST
#          value: service-registry-service-2
#        - name: mddz_EUREKA_PEER3_HOST
#          value: service-registry-service-3
#        - name: JAVA_TOOL_OPTIONS
#          value: "-Xms256m -Xmx410m"
        - name: ENCRYPT_KEY
          valueFrom:
            secretKeyRef: { name: encrypt-key-secret, key: encrypt-key }
        envFrom:
          - configMapRef:
              name: service-registry-config
        resources:
          requests:
            cpu: 50m
            memory: 150Mi
          limits:
            cpu: 300m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8761
          initialDelaySeconds: 20
          periodSeconds: 10
        readinessProbe:
          httpGet:
            port: 8761
            path: /actuator/health/readiness
          initialDelaySeconds: 10
          periodSeconds: 5
        startupProbe:
          httpGet:
            path: /actuator/health
            port: 8761
          failureThreshold: 30
          periodSeconds: 5
        volumeMounts:
          - name: peer1-logs
            mountPath: /home/mddz/logs/service-registry
            subPathExpr: $(INSTANCE_NAME)

---

