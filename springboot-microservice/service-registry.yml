apiVersion: v1
kind: Service
metadata:
  name: service-registry-service-1
  namespace: mddz
  labels:
    app: service-registry-1
    app.kubernetes.io/name: service-registry-1
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8761"
spec:
  sessionAffinity: ClientIP
  type: ClusterIP
  ipFamilyPolicy: SingleStack
  ipFamilies:
    - IPv4
  selector:
    app: service-registry-1
  ports:
  - protocol: TCP
    port: 8761
    targetPort: 8761

