---
# Create a Pod called redis-storage with image: redis:alpine with a Volume of type emptyDir that "lasts for the life of the Pod"

apiVersion: v1
kind: Pod
metadata:
  name: redis-storage
  namespace: redis-ns
spec:
  securityContext:
    fsGroup: 999
    seccompProfile:
      type: RuntimeDefault
  volumes:
    # emptyDir volume: temporary storage that exists for the lifetime of the Pod.
    - name: temp-vol
      emptyDir: {}
  containers:
    - name: redis-storage
      image: redis:7.2.5-alpine
      volumeMounts:
        - name: temp-vol
          mountPath: /data/redis
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi

---
# PersistentVolume backed by an AWS EBS volume.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-vol1
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  # what happens when volume is release from the PVC
  persistentVolumeReclaimPolicy: Retain
  awsElasticBlockStore:
    volumeID: "*******"
    fsType: ext4

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: myclaim
spec:
  # will only choose PV with the same access mode
  accessModes:
    - ReadWriteOnce
  # The requested size must be less than or equal to a matching PV capacity.
  resources:
    requests:
      storage: 500Mi

---
# Pod with AWS EBS volume 
apiVersion: v1
kind: Pod
metadata:
  name: mypod
spec:
  securityContext:
    fsGroup: 101
    seccompProfile:
      type: RuntimeDefault
  volumes:
    - name: mypv
      persistentVolumeClaim:
        claimName: myclaim
  containers:
    - name: myfrontend
      image: nginxinc/nginx-unprivileged:1.25-alpine
      ports:
        - containerPort: 8080
      volumeMounts:
        - name: mypv
          mountPath: /usr/share/nginx/html
      securityContext:
        runAsUser: 101
        runAsGroup: 101
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi

---
# Pod with hostPath 
apiVersion: v1
kind: Pod
metadata:
  name: num-generator
spec:
  securityContext:
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: alpine
      image: alpine:3.20
      command: ["/bin/sh", "-c"]
      args: ["shuf -i 0-100 -n 1 >> /opt/number.out"]
      volumeMounts:
        - name: data-volume
          mountPath: /opt
      securityContext:
        runAsUser: 1000
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
  volumes:
    - name: data-volume
      # hostPath uses a directory from the node (host machine that kubernetes pods run on) where the Pod is scheduled.
      hostPath:
        path: /data
        type: Directory

# Volume types:
# azureDisk mounts a Microsoft Azure Data Disk into a Pod.
# hostPath mounts a directory from the node where the Pod is running.
# emptyDir {} stores data only while the Pod exists on that node.
# fc mounts an existing Fibre Channel block storage volume.

---
# PersistentVolume backed by a hostPath directory.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-log
spec:
  capacity:
    storage: 100Mi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /pv/log
    # Mount the directory at /pv/log on the node. If it doesn't exist yet, create it (including any missing parent directories) with permissions 0755, owned by the same group and user running the kubelet.
    type: DirectoryOrCreate

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: claim-log-1
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 50Mi

# Even when the PVC request is smaller than the PV, the PVC binds to the whole PV
# A PVC used by a running Pod can stay in Terminating until the Pod releases it

---
# StorageClass for dynamic AWS EBS provisioning.

apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: ebs-sc
provisioner: ebs.csi.aws.com
# WaitForFirstConsumer => the PV is not provisioned or bound until a Pod uses the PVC.
volumeBindingMode: WaitForFirstConsumer
parameters:
  type: io1
  iopsPerGB: "10"
  fsType: ext4

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ebs-claim
spec:
  accessModes:
    - ReadWriteOnce
  # connect to the storageClass that is named "ebs-sc"
  storageClassName: ebs-sc
  resources:
    requests:
      storage: 1Gi

#  Normal  WaitForFirstConsumer  5s (x8 over 97s)  persistent-volume-controller  waiting for first consumer to be created before binding => this means no pod is consuming the PVC
# this happens when we have "volumeBindingMode: WaitForFirstConsumer" in SC, so it won't bind unless PVC is connected to pod


####################
# PV-PVC for MongoDB
####################
---
# we can have a PV from an specific type of StorageClass
apiVersion: v1
kind: PersistentVolume
metadata:
  name: local-storage
spec:
  storageClassName: mylocalstorage
  capacity:
    storage: 6Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /mnt/new/directory/structure
    type: DirectoryOrCreate

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-pvc
spec:
  storageClassName: mylocalstorage
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi


---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-deployment
  labels:
    component: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      component: postgres
  template:
    metadata:
      labels:
        component: postgres
    spec:
      securityContext:
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault

      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-storage-claim

      containers:
        - name: postgres
          image: fhsinchy/notes-postgres:1.0.0
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
              # subPath tells Kubernetes to mount only a specific subdirectory of the volume into the container, rather than the volume root
              # without subPath => volume root  →  /var/lib/postgresql/data
              # with subPath =>    volume root/postgres/  →  /var/lib/postgresql/data
              # Only the postgres/ subdirectory inside the volume is mounted there
              subPath: postgres
          env:
            - name: POSTGRES_DB
              value: notesdb
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
          securityContext:
            runAsUser: 999
            runAsGroup: 999
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi

---
# PersistentVolume with node affinity

apiVersion: v1
kind: PersistentVolume
metadata:
  name: example-pv
spec:
  capacity:
    storage: 200Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Delete
  storageClassName: local-storage
  local:
    path: /mnt/disks/ss1
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - example-node

# Several PVCs can reference the same StorageClass for dynamic PV provisioning

---
# Pod with a ConfigMap mounted as a volume
apiVersion: v1
kind: Pod
metadata:
  name: mypod-0
  labels:
    run: mypod-0
spec:
  securityContext:
    seccompProfile:
      type: RuntimeDefault
  volumes:
    # since we reference the configMap itself, everything inside it will be mounted to the volume
    - name: config-dir
      configMap:
        name: bb-configmap
  containers:
    - name: busybox-container-0
      image: busybox:1.36.1
      command: ["/bin/sh", "-c"]
      args: ["sleep 3600"]
      volumeMounts:
        - name: config-dir
          mountPath: /etc/config
          readOnly: true
      securityContext:
        runAsUser: 1000
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi

---
# Pod with a Secret mounted as a volume
apiVersion: v1
kind: Pod
metadata:
  name: mypod-1
spec:
  securityContext:
    seccompProfile:
      type: RuntimeDefault
  volumes:
    - name: secret-dir
      secret:
        secretName: bb-secret
  containers:
    - name: busybox-container-1
      image: busybox:1.36.1
      command: ["/bin/sh", "-c"]
      args: ["sleep 3600"]
      volumeMounts:
        - name: secret-dir
          mountPath: /etc/secret
          readOnly: true
      securityContext:
        runAsUser: 1000
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi

---
# Create a new PersistentVolumeClaim: Name: pv-volume | Class: csi-hostpath-sc | Capacity: 10Mi
# Create a new Pod which mounts the PVC as a volume: Name: web-server, Image: nginx, Mount path: /usr/share/nginx/html, ReadWriteOnce access on the volume.
# using kubectl edit or kubectl patch expand the PersistentVolumeClaim to a capacity of 70Mi and record that change.

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pv-volume
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: csi-hostpath-sc
  resources:
    requests:
      storage: 10Mi

---
apiVersion: v1
kind: Pod
metadata:
  name: web-server
spec:
  securityContext:
    fsGroup: 101
    seccompProfile:
      type: RuntimeDefault
  volumes:
    - name: pv-volume
      persistentVolumeClaim:
        claimName: pv-volume
  containers:
    - name: web-server
      image: nginxinc/nginx-unprivileged:1.25-alpine
      ports:
        - containerPort: 8080
      volumeMounts:
        - name: pv-volume
          mountPath: /usr/share/nginx/html
      securityContext:
        runAsUser: 101
        runAsGroup: 101
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi


# kubectl edit pvc pv-volume   (goes inside the pod via vim to edit it directly)
# or
# kubectl patch pvc pv-volume -p '{"spec":{"resources":{"requests":{"storage":"70Mi"}}}}'
