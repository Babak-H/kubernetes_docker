# this is required when the docker image is inside a private repository and we need to pull it from there (which requires authentication with the dockerhub,...)

apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
  labels:
    app: my-app
spec:
  replicas: 4
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      # Username/password or token credentials for the private image registry
      imagePullSecrets:
        - name: my-registry-key
      containers:
        - name: my-app
          # full address of the image: registry.example.com/team/my-app:1.0.0
          image: <REGISTRY>/<IMAGE-NAME>:<IMAGE-VERSION>
          # always pull from the remote registry, even if a matching image exists on the node
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

---
apiVersion: v1
kind: Service
metadata:
  name: my-app
spec:
  type: ClusterIP
  selector:
    app: my-app
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP

---
# docker registry pull Secret

apiVersion: v1
kind: Secret
metadata:
  name: my-registry-key
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: <BASE64-ENCODED-OF-.DOCKER/CONFIG.JSON-FILE>

# Example for AWS ECR:
# aws ecr get-login-password --region <REGION> | docker login --username AWS --password-stdin <ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com

# Docker stores registry credentials in ~/.docker/config.json
# Encode that file and use it as the .dockerconfigjson value above

# cat ~/.docker/config.json | base64 -w 0
# kubectl apply -f docker-secret.yml
# kubectl get secret my-registry-key
