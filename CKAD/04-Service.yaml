# Services route traffic to Pods selected by labels

---
# ClusterIP Service: reachable only inside the cluster
apiVersion: v1
kind: Service
metadata:
  name: back-end
  labels:
    app: myapp
    tier: backend
spec:
  type: ClusterIP
  # Selects Pods that have both labels
  selector:
    app: myapp
    tier: backend
  ports:
    - name: http
      port: 80 # Service port used by other cluster resources to connect to the pod
      targetPort: 80 # Container port on the selected Pods
      protocol: TCP

---
# NodePort Service: exposes the Service on every node at a static high port
apiVersion: v1
kind: Service
metadata:
  name: myapp-service
  labels:
    app: myapp
    tier: frontend
spec:
  type: NodePort
  selector:
    app: myapp
    tier: frontend
  ports:
    - name: http
      # The Service port inside the cluster. Other Pods/resources can call => myapp-service:80  , Pod -> Service:80 -> Pod:8080
      port: 80 # Service port
      targetPort: 8080 # Container port on the selected Pods
      # The port opened on every Kubernetes Node. External clients can call => <NodeIP>:30008 , External client -> NodeIP:30008 -> Service:80 -> Pod:8080
      nodePort: 30008 # Node port; valid range is usually 30000-32767.
      protocol: TCP

---
# Basic LoadBalancer Service: asks the platform for an external load balancer (like AWS, Azure,...)
apiVersion: v1
kind: Service
metadata:
  name: hello-kube-loadbalancer-service
  labels:
    component: web
spec:
  type: LoadBalancer
  selector:
    component: web
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP

---
# AWS LoadBalancer Service example.
apiVersion: v1
kind: Service
metadata:
  name: nginx
  labels:
    app: nginx
  annotations:
    # AWS-specific: request a Network Load Balancer.
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    # AWS-specific: create an internal/private load balancer.
    service.beta.kubernetes.io/aws-load-balancer-internal: "true"
spec:
  type: LoadBalancer
  selector:
    app: nginx
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP

---
# NodePort Service with multiple ports.
apiVersion: v1
kind: Service
metadata:
  name: my-service-multiple
  labels:
    app: my-app
spec:
  type: NodePort
  selector:
    app: my-app
  # Optional fixed cluster IP. Omit this in most real manifests and let Kubernetes assign one.
  clusterIP: 10.97.153.249
  externalTrafficPolicy: Cluster
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 32714
      protocol: TCP
    - name: metrics
      port: 17176
      targetPort: 17176
      nodePort: 32715
      protocol: TCP
