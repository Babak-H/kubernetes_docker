# ClusterIP service
---
apiVersion: v1
kind: Service
metadata:
  # name of this service
  name: back-end
spec:
  # type of service is clusterIP which is only available inside the cluster (usually matched with ingress for exposing it to outside world)
  type: ClusterIP
  # chooses the pods that we attach this service too via labels
  selector:
    # the pod should have these two labels
    app: myapp
    type: backend
  ports:
    - targetPort: 80 # port on the pod
      port: 80 # port of this service (other resources connect to this)


# NodePort service (we expose the pod/deployment to outside world directly via a port on Node(host machine) )
---
apiVersion: v1
kind: Service
metadata:
  name: myapp-service
spec:
  type: NodePort
  selector:
    app: myapp
    type: frontend
  ports:
    - port: 80  # port on service (when we do not mention targetPort, it means that it is the same as the port on service)
      targetPort: 80  # port on pod
      # must have a value between 30000 and 32767
      nodePort: 30008  # port on Node (underlying machine that pods run on it)


# basic LoadBalancer Service
---
apiVersion: v1
kind: Service
metadata:
  name: hello-kube-loadbalancer-service
spec:
  type: LoadBalancer
  selector:
    component: web
  ports:
    - port: 80
      targetPort: 80

---
# LoadBalancer Service for AWS

apiVersion: v1
kind: Service
metadata:
  name: nginx
  annotations:
    # aws specific: upgrade classic LB to NLB
    service.kubernetes.io/aws-load-balancer-type: "nlb"
    # aws specific: provision private loadbalancer
    service.kubernetes.io/aws-load-balancer-internal: "true"
spec:
  type: LoadBalancer
  ports:
    - name: web
      port: 80
  selector:
    app: nginx

---
# kubernetes Service with Multiple Ports

apiVersion: v1
kind: Service
metadata:
  name: my-service-multiple
spec:
  selector:
    app: my-app
  # this is the clusterIP of this Service, it can be accessed via this elasticIP
  clusterIP: 10.97.153.249
  externalTrafficPolicy: Cluster
  ports:
    - name: port-1
      nodePort: 32714
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: port-2
      nodePort: 32715
      port: 17176
      protocol: TCP
      targetPort: 17176
