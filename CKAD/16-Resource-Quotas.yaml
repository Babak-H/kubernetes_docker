# ResourceQuota limits total resource usage in a namespace
# LimitRange sets default, minimum, and maximum resources for individual Pods or containers

---
# this will be in the default namespace
apiVersion: v1
kind: ResourceQuota
metadata:
  name: my-resource-quota
spec:
  hard:
    # Total requested CPU and memory allowed in this namespace
    requests.cpu: "4"
    requests.memory: 10Gi
    # Total CPU and memory limits allowed in this namespace
    limits.cpu: "8"
    limits.memory: 20Gi

---
# ResourceQuota in namespace one:
# total requests cpu=1, memory=1Gi; total limits cpu=2, memory=2Gi
apiVersion: v1
kind: ResourceQuota
metadata:
  name: my-rq
  namespace: one
spec:
  hard:
    requests.cpu: "1"
    requests.memory: 1Gi
    limits.cpu: "2"  # the total of all cpu requests in the namespace one should be 2 vcpu or less
    limits.memory: 2Gi

---
# LimitRange example for CPU defaults and constraints per container
# Error from server (Forbidden): pods "nginx" is forbidden: maximum memory usage per Container is 500Mi, but limit is 4Gi Limit Range

apiVersion: v1
kind: LimitRange
metadata:
  name: cpu-resource-constraint
spec:
  limits:
    - type: Container
      # Applied when a container does not specify resources.limits.cpu
      default:
        cpu: 500m
      # Applied when a container does not specify resources.requests.cpu
      defaultRequest:
        cpu: 500m
      # Maximum CPU limit allowed per container
      max:
        cpu: "1"
      # Minimum CPU request required per container.
      min:
        cpu: 100m

---
apiVersion: v1
kind: LimitRange
metadata:
  name: memory-resource-constraint
spec:
  limits:
    - type: Container
      # Default memory limit applied when a container does not set one
      default:
        memory: 1Gi
      # Default memory request applied when a container does not set one
      defaultRequest:
        memory: 1Gi
      # Maximum memory limit allowed per container
      max:
        memory: 1Gi
      # Minimum memory request required per container
      min:
        memory: 500Mi


---
# Create a namespace named "one" with a LimitRange that limits pod memory to a max of 500Mi and min of 100Mi
# k create ns one

apiVersion: v1
kind: Namespace
metadata:
  name: one

---
apiVersion: v1
kind: LimitRange
metadata:
  name: my-ns-limit
  namespace: one
spec:
  limits:
    - type: Container
      max:
        memory: 500Mi
      min:
        memory: 100Mi

# Example error:
# The Pod "nginx" is invalid: spec.containers[0].resources.requests: Invalid value: "512Mi": must be less than or equal to memory limit of 500Mi


---
# Create the YAML for a new ResourceQuota called 'myrq' with hard limits of 1 CPU, 1G memory and 2 pods without creating it
# k create quota myrq --hard=cpu=1,memory=1G,pods=2 --dry-run=client -o yaml > rq.yaml

apiVersion: v1
kind: ResourceQuota
metadata:
  name: myrq
spec:
  hard:
    requests.cpu: "1"
    requests.memory: 1Gi
    pods: "2"
