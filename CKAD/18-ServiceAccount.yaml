---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dashboard-sa
# Disable automatic API token mounting unless the workload needs to call the Kubernetes API
automountServiceAccountToken: false

---
# Deployment/Pod with a custom ServiceAccount

apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-dashboard
  labels:
    app: web-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-dashboard
  template:
    metadata:
      labels:
        app: web-dashboard
    spec:
      serviceAccountName: dashboard-sa
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web-dashboard
          image: gcr.io/kodekloud/customimage/my-kubernetes-dashboard:1.0.0
          ports:
            - containerPort: 8080
              protocol: TCP
          securityContext:
            runAsUser: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

---
# create a pod with specific service account

apiVersion: v1
kind: Pod
metadata:
  name: nginx
  labels:
    app: nginx
spec:
  serviceAccountName: myuser
  automountServiceAccountToken: false
  securityContext:
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: nginx
      image: nginxinc/nginx-unprivileged:1.25-alpine
      ports:
        - containerPort: 8080
          protocol: TCP
      securityContext:
        runAsUser: 101
        runAsGroup: 101
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi

# we have serviceAccount called 'neptune-sa-v2' in 'neptune' namespace, get a short-livede token for this serviceaccount
# kubectl -n neptune create token neptune-sa-v2
#
# Older clusters may use ServiceAccount token Secrets:
# kubectl -n neptune get sa
# kubectl -n neptune get secrets
# kubectl -n neptune get secret neptune-secret-1 -o yaml
# echo "VALUE-FROM-SECRET-FILE" | base64 -d > /opt/course/5/token

---
# LEGACY METHOD
# ServiceAccount token Secret example for clusters or workflows that still require a Secret-backed token:

apiVersion: v1
kind: Secret
metadata:
  name: my-token-secret
  annotations:
    kubernetes.io/service-account.name: my-service-account
type: kubernetes.io/service-account-token

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: my-service-account
secrets:
  - name: my-token-secret

# Verify the association:
# kubectl describe serviceaccount my-service-account
