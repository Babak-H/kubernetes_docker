# ReadinessProbe => checks to see if the app is ready to accept traffic, does NOT kill the container/pod, but marks the container as "NOT READY" and removes it from service endpoint
# Readiness probe → “Is this container ready to serve traffic?” (If not, remove it from Service endpoints.)

# LivenessProbe => checks if the container is responsive and is working, can kill and restart the container/pod if failure threshold reaches
# Liveness probe → “Is this container alive?” (If not, restart it.)

# StartupProbe => used for legacy applications, it DELAYS readiness and liveness probes

---
apiVersion: v1
kind: Pod
metadata:
  name: goproxy
  labels:
    app: goproxy
spec:
  securityContext:
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: goproxy
      image: registry.k8s.io/goproxy:0.1
      ports:
        - containerPort: 8080
          protocol: TCP

      # to check if container is ready to accept traffic
      # readiness probe will run DURING THE WHOLE POD LIFECYCLE
      # TCP readiness check: remove the Pod from Service endpoints if port 8080 is not accepting connections
      readinessProbe:
        tcpSocket:
          port: 8080
        # wait at first 5 seconds, then 10s each round until it is ready to accept traffic
        initialDelaySeconds: 5
        periodSeconds: 10
        failureThreshold: 5

      # to check if the code is running or not
      # if failure is consistent, will cause the pod to RESTART
      # will run DURING THE WHOLE POD LIFECYCLE
      # This probe attempts to open a TCP connection to the given port on the container, If it successfully connects, it’s considered healthy
      # for Services like databases, message brokers, or custom TCP servers that don’t use HTTP
      livenessProbe:
        tcpSocket:
          port: 8080
        # at first delay 20 seconds, then check every 25 until we see if the container is running the code
        initialDelaySeconds: 20
        periodSeconds: 25
        failureThreshold: 3

      # Startup check runs before the liveness probe is enforced
      # the first probe, this is when application starts to run
      # try 3 times and after each time wait 10 seconds, if then api is unavailable, restart the pod
      startupProbe:
        httpGet:
          path: /healthz
          port: 8080
        failureThreshold: 3
        periodSeconds: 10
      securityContext:
        runAsUser: 1000
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      resources:
        requests:
          cpu: 100m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi

---
apiVersion: v1
kind: Pod
metadata:
  name: simple-webapp
  labels:
    app: simple-webapp
spec:
  securityContext:
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: simple-webapp
      image: webapp-delayed-start:1.0.0
      ports:
        - containerPort: 8080
          protocol: TCP
      env:
        - name: APP_START_DELAY
          value: "80"

      readinessProbe:
        # After 4 failed readiness checks, the Pod is marked NotReady but is not restarted
        failureThreshold: 4
        httpGet:
          path: /ready
          port: 8080
          scheme: HTTP
        initialDelaySeconds: 10 # wait for 10 seconds after pod starts to check the readiness
        periodSeconds: 5

      livenessProbe:
        httpGet:
          path: /live
          port: 8080
        initialDelaySeconds: 80
        periodSeconds: 5
        failureThreshold: 4

      securityContext:
        runAsUser: 1000
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 250m
          memory: 256Mi

---
# Exec liveness probe example

apiVersion: v1
kind: Pod
metadata:
  name: liveness-http
  labels:
    app: liveness-pod
spec:
  securityContext:
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: liveness
      image: registry.k8s.io/liveness:0.1
      command: ["/bin/sh", "-c", "touch /tmp/healthy; sleep 15; rm -f /tmp/healthy; sleep 3600"]
      
      livenessProbe:
        exec:
          command:
            - cat
            - /tmp/healthy
        initialDelaySeconds: 5
        periodSeconds: 5
        failureThreshold: 3
      securityContext:
        runAsUser: 1000
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi

---
# we have several pods in different namespaces, find the ones that are not ready. troubleshoot and fix the issues. add check to "restart" the container if command "ls /var/www/html/file_check" fails => LivenessProbe
# this check should start with delay of 10 sec and run every 60 secs
# restart the container => liveness Probe (readiness probe just tags the pod as NOT READY)
# k get pod --all-namespaces
# k describe pod nginx1401 -n dev1401 => we can see the readiness probe has failed
# k get pod nginx1401 -n dev1401 -o yaml > nginx.yaml
# vi nginx.yaml

apiVersion: v1
kind: Pod
metadata:
  name: nginx1401
  namespace: dev1401
  labels:
    app: nginx1401
spec:
  securityContext:
    fsGroup: 101
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: nginx
      image: nginxinc/nginx-unprivileged:1.25-alpine
      ports:
        - containerPort: 8080
          protocol: TCP
      livenessProbe:
        exec:
          command:
            - ls
            - /var/www/html/file_check
        initialDelaySeconds: 10
        periodSeconds: 60
        failureThreshold: 3
      readinessProbe:
        httpGet:
          path: /
          port: 8080
        periodSeconds: 10
        timeoutSeconds: 2
        failureThreshold: 3
      securityContext:
        runAsUser: 101
        runAsGroup: 101
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi

# kubectl replace -f nginx1401.yaml --force => since we are replacing already existing pod

---
apiVersion: v1
kind: Pod
metadata:
  name: ready-if-service-ready
  labels:
    app: ready-if-service-ready
spec:
  securityContext:
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: ready-if-service-ready
      image: nginxinc/nginx-unprivileged:1.25-alpine
      ports:
        - containerPort: 8080
          protocol: TCP

      livenessProbe:
        exec:
          # true command should be between "" otherwise will get an error
          command:
            - "true"

      readinessProbe:
        exec:
          command: ["sh", "-c", "wget -T2 -O- http://service-am-i-ready:80"]

      securityContext:
        runAsUser: 101
        runAsGroup: 101
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi
