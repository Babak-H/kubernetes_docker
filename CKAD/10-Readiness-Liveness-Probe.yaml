# we have several pods in different namespaces, find the ones that are not ready. troubleshoot and fix the issues. add check to "restart" the container if command "ls /var/www/html/file_check" fails => LivenessProbe
# this check should start with delay of 10 sec and run every 60 secs
# restart the container => liveness Probe (readiness probe just tags the pod as NOT READY)
# k get pod --all-namespaces
# k describe pod nginx1401 -n dev1401 => we can see the readiness probe has failed
# k get pod nginx1401 -n dev1401 -o yaml > nginx.yaml
# vi nginx.yaml

apiVersion: v1
kind: Pod
metadata:
  name: nginx1401
  namespace: dev1401
spec:
  containers:
    - image: nginx:alpine
      name: nginx
      ports:
        - containerPort: 9080
          protocol: TCP
      # we did not define the "failureThreshold" here, so it will be the defualt one which is 3
      livenessProbe:
        exec:
          command:
            - ls
            - /var/www/html/file_check
        initialDelaySeconds: 10
        periodSeconds: 60
      readinessProbe:
        failureThreshold: 3
        httpGet:
          port: 9080
          path: /
        periodSeconds: 10
        timeoutSeconds: 2 # timeoutSeconds => specifies how quickly the container needs to respond to the probe (1 is the default value here)

# kubectl replace -f nginx1401.yaml --force => since we are replacing already existing pod

---
apiVersion: v1
kind: Pod
metadata:
  labels:
    run: ready-if-service-ready
  name: ready-if-service-ready
spec:
  containers:
    - image: nginx:1.16.1-alpine
      name: ready-if-service-ready
      livenessProbe:
        exec:
          command:
            - "true" # true command should be between "" otherwise will get an error
      readinessProbe:
        exec:
          command: ["sh", "-c", "wget -T2 -O- http://service-am-i-ready:80"]
