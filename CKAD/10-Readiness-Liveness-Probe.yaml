# ReadinessProbe => checks to see if the app is ready to accept traffic, does NOT kill the container/pod, but marks the container as NOT READY and removes it from service endpoint
# Readiness probe → “Is this container ready to serve traffic?” (If not, remove it from Service endpoints.)
# LivenessProbe => checks if the container is responsive and is working, can kill and restart the container/pod if failure threshold reaches
# Liveness probe → “Is this container alive?” (If not, restart it.)

# StartupProbe => used for legacy applications, it DELAYS readiness and liveness probes

apiVersion: v1
kind: Pod
metadata:
  name: goproxy
  labels:
    app: goproxy
spec:
  containers:
    - name: goproxy
      image: k8s.gcr.io/goproxy:0.1
      resources:
        limits:
          memory: 128Mi
          cpu: 200m
      ports:
        - containerPort: 8080
      # to check if container is ready to accept traffic
      # wait at first 5 seconds, then 10s each round until it is ready to accept traffic
      # readiness probe will run DURING THE WHOLE POD LIFECYCLE
      readinessProbe:
        tcpSocket:
          port: 8080
        initialDelaySeconds: 5
        periodSeconds: 10
        failureThreshold: 5
      # to check if the code is running or not
      # at first delay 25 seconds, then check every 20 until we see if the container is running the code
      # if failure is consistent, will cause the pod to RESTART
      # will run DURING THE WHOLE POD LIFECYCLE
      livenessProbe:
        # This probe attempts to open a TCP connection to the given port on the container, If it successfully connects, it’s considered healthy
        # for Services like databases, message brokers, or custom TCP servers that don’t use HTTP
        tcpSocket:
          port: 8080
        initialDelaySeconds: 20
        periodSeconds: 25
        failureThreshold: 3
      # the first probe, this is when application starts to run
      # try 3 times and after each time wait 10 seconds, if then api is unavailable, restart the pod
      startupProbe:
        # Kubernetes performs an HTTP GET to http://<pod-ip>:80/healthz
        # If the HTTP status code is between 200 and 399, it’s considered successful
        httpGet:
          path: /healthz
          port: 80
        failureThreshold: 3
        periodSeconds: 10

---
apiVersion: v1
kind: Pod
metadata:
  labels:
    name: simple-webapp
  name: simple-webapp
spec:
  containers:
    - name: simple-webapp
      image: webapp-delayed-start
      ports:
        - containerPort: 8080
          protocol: TCP
      env:
        - name: APP_START_DELAY
          value: "80"
      readinessProbe:
        failureThreshold: 4 # after 4 failures to get 200 response from the endpoint, pod will be restarted
        httpGet:
          path: /ready
          port: 8080
          scheme: HTTP
        initialDelaySeconds: 10 # wait for 10 seconds after pod starts to check the readiness
        periodSeconds: 5 # do it every 5 seconds
      livenessProbe:
        httpGet:
          path: /live
          port: 8080
        initialDelaySeconds: 80
        periodSeconds: 1
        failureThreshold: 4

---
# command execution via probe

apiVersion: v1
kind: Pod
metadata:
  labels:
    name: liveness-pod
  name: liveness-http
spec:
  containers:
    - name: liveness
      image: k8s.gcr.io/liveness
      command:
        [
          "/bin/sh",
          "-c",
          "touch /tmp/healthy; sleep 15; rm -rf /tmp/healthy; sleep 3600;",
        ]
      livenessProbe:
        exec:
          command:
            - cat
            - /tmp/healthy
        initialDelaySeconds: 5
        periodSeconds: 5
        failureThreshold: 3

