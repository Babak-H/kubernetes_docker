# k get networkpolicy
# If a policy selects Pods and has a policy type with no rules for that type, traffic for that type is denied
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: db-policy
spec:

  # only apply this policy to pods that have this label on them, use labels to select a group of pods for which the rules will be applied to
  podSelector:
    matchLabels:
      role: db

  # apply ingress (incoming) and egress (outgoing) policies, can be Ingress and Egress or both. this will determine if the rules will be applied to Incoming
  # and/or Outgoing traffic. if not defined, then Ingress will be enabled and Egress only when there are rules defined
  policyTypes:
    - Ingress
    - Egress

  # these sections allow a list of from (Ingress) or to (Egress) and port blocks. each from/to block contains a range of IPs (ipBlock) and/or a list of namespaces selected by label (namespaceSelector), and/or a
  # list of pods by label (podSelector) that select which IPs, namespaces or pods our target can talk to. the ports block define which ports are affected by this rule

  # Traffic that comes to this pod (role: db)
  ingress:
    - from:
        # allow traffic from pods with such label
        - podSelector:
            matchLabels:
              name: api-pod
        # allow traffic from this namespace to access this pod (role: db)
        - namespaceSelector:
            matchLabels:
              name: prod
        # allow traffic to this pod, from this ip range
        - ipBlock:
            cidr: 192.168.5.10/32
      # all these traffic (from above sources) can only come in through this port range
      ports:
        - protocol: TCP
          port: 3306
  # traffic going outside this pod
  egress:
    # allow traffic to go out to this ip range
    - to:
        - ipBlock:
            cidr: 192.168.5.10/32
      # allow traffic to only go out via the port 80
      ports:
        - protocol: TCP
          port: 80

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: internal-policy
spec:
  podSelector:
    matchLabels:
      name: internal
  policyTypes:
    - Egress
    - Ingress
  # # no resource can send traffic to this netpol's target pod (name: internal)
  ingress: []
  egress:
    # Traffic to mysql Pods is allowed only on TCP port 3306
    - to:
        - podSelector:
            matchLabels:
              name: mysql
      ports:
        - protocol: TCP
          port: 3306
    # Traffic to payroll Pod is allowed only on TCP port 8080
    - to:
        - podSelector:
            matchLabels:
              name: payroll
      ports:
        - protocol: TCP
          port: 8080
    # Allow DNS to any destination (these ports are allowed on all outgoing pods)
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

---
# we have a pod named "secure-pod" and a service called "secure-service" and Incoming and Outgoing traffic are not working
# make sure pod "web-color" can access secure-pod

# k get pod => make sure pod is running
# k get svc => make sure service works, its clusterip on port 80
# k get netpol => check if there are any networkpolicies

# k describe netpol default-deny => we can see allowing ingress traffic is set to <none>
# we can create a new network policy that allows incoming traffic (netpols work in addition to each other)
# k get pod --show-label => check what label is secure-pod using, we need it when creating network policy

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: secure-policy
spec:
  podSelector:
    matchLabels:
      run: secure-pod
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              name: webapp-color
      ports:
        - protocol: TCP
          port: 80

# kubectl exec -it webapp-color -- sh
# nc -v -z -w 2 secure-service 80  # try connecting from inside this pod to secure-pod's service

---
# NetworkPolicy for Redis Pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-access
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              access: redis
      ports:
        - protocol: TCP
          port: 6379

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: np-100x
  namespace: default
spec:
  podSelector:
    matchLabels:
      level: 100x
  policyTypes:
    - Egress
  egress:
    - to:
        # Pods must be in namespace level-1000 AND have label level=100x , and olny traffic to port 80 is allowed
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: level-1000
          podSelector:
            matchLabels:
              level: 100x
      ports:
        - port: 80
          protocol: TCP
    # pods must be in namespace level-1001 and have label level=100x and only traffic to port 80 is allowed.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: level-1001
          podSelector:
            matchLabels:
              level: 100x
      ports:
        - port: 80
          protocol: TCP
    # This separate rule allows DNS traffic to any destination
    - ports:
        - port: 53
          protocol: TCP
        - port: 53
          protocol: UDP

---
# This NetworkPolicy is a default deny-ingress policy
# namespace: test-3 → The policy applies only within the test-3 namespace, podSelector: {} → This matches all Pods in that namespace. policyTypes: [Ingress] → The policy only affects incoming (Ingress) network traffic to Pods

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: test-3
spec:
  # Select all Pods in this namespace
  podSelector: {}
  policyTypes:
    - Ingress
  # if we do not mention any specific ingress policy , all is denied!
  ingress: []

---
# you have a cluster with pods in many namespaces. "db" pods in "project-a" ns should only be acceesible from "service" pods that are running in "project-b" ns => create networkPolicy

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-service-to-db
  namespace: project-a
spec:
  podSelector:
    matchLabels:
      app: db
  policyTypes:
    - Ingress
  ingress:
    - from:
        # namespaceSelector and podSelector in the same item are an AND condition
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: project-b
          podSelector:
            matchLabels:
              app: service

# Test from a project-b service Pod:
# k -n project-b exec service-xxx -- ping 192.168.1.3
