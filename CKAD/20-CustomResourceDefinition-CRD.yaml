# CustomResourceDefinition (CRD) extends the Kubernetes API with a new resource type
# CustomResource (CR) is an instance of that type (CR is like an object of the class CRD)

---
# CustomResourceDefinition for FlightTicket resources
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: flighttickets.flights.com
spec:
  group: flights.com # same as : apiVersion: "flights.com"/v1 in CustomResource
  scope: Namespaced
  names:
    singular: flightticket
    plural: flighttickets
    kind: FlightTicket
    shortNames:
      - ft
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                from:
                  type: string
                to:
                  type: string
                number:
                  type: integer
                  minimum: 1
                  maximum: 10
              required:
                - from
                - to
                - number

---
# CustomResource using the FlightTicket CRD
apiVersion: flights.com/v1
kind: FlightTicket
metadata:
  name: my-flight-ticket
spec:
  from: Warsaw
  to: Miami
  number: 2

# kubectl get flighttickets
# kubectl get ft

---
# CustomResourceDefinition for Internal resources
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: internals.datasets.kodekloud.com
spec:
  group: datasets.kodekloud.com
  scope: Namespaced  # this CRD resources are created inside a namespace
  names:
    singular: internal
    plural: internals
    kind: Internal
    shortNames:
      - int
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        # the values here should reflect the ones from spec section of the Custom Resource file
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                internalLoad:
                  type: string
                  enum:
                    - low
                    - medium
                    - high
                range:
                  type: integer
                  minimum: 0
                  maximum: 100
                percentage:
                  type: string
              required:
                - internalLoad
                - range
                - percentage

---
# CustomResource using the Internal CRD
apiVersion: datasets.kodekloud.com/v1
kind: Internal
metadata:
  name: internal-space
spec:
  internalLoad: high
  range: 80
  percentage: "50"

# kubectl apply -f crd.yaml
# kubectl apply -f cr.yaml
#
# Check CRDs:
# kubectl describe crd collectors.monitoring.controller
# kubectl get crd collectors.monitoring.controller
#
# CRDs define API types. A custom controller is needed when those resources should trigger behavior in the cluster
