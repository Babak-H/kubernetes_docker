# Canary deployment sends traffic to both stable and canary versions through one Service
# With 4 stable replicas and 1 canary replica, traffic is roughly 80% stable and 20% canary

---
apiVersion: v1
kind: Service
metadata:
  name: my-service
  labels:
    app: myapp
spec:
  type: ClusterIP
  # Select both stable and canary Pods
  selector:
    app: myapp  #######
    tier: frontend #######
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-primary
  labels:
    app: myapp  
    tier: frontend 
    track: stable 
spec:
  replicas: 4 #
  selector:
    matchLabels:
      app: myapp
      tier: frontend
      track: stable
  template:
    metadata:
      labels:
        app: myapp  #######
        tier: frontend  #######
        track: stable # different
        version: v1 # different
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app-container
          image: myapp-image:1.0  # V1
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            runAsUser: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-canary
  labels:
    app: myapp
    tier: frontend
    track: canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: myapp
      tier: frontend
      track: canary
  template:
    metadata:
      labels:
        app: myapp  #######
        tier: frontend  #######
        track: canary # different
        version: v2  # different
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app-container
          image: myapp-image:2.0  # V2
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            runAsUser: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
