# Cluster Autoscaler
# Cluster Autoscaler changes the number of worker nodes in a cluster
# It is different from HPA:
# - HPA changes the number of Pods
# - Cluster Autoscaler changes the number of Nodes

# Main idea:
# If Pods are Pending because the scheduler cannot place them due to missing CPU, memory,
# or scheduling constraints, Cluster Autoscaler can ask the cloud provider/node group to add nodes
# If nodes are underused and their Pods can be moved elsewhere, it can remove nodes

# - Cluster Autoscaler usually runs in kube-system
# - It does not scale individual Pods. Use HPA or VPA for that
# - It reacts mostly to unschedulable Pending Pods
# - It respects PodDisruptionBudgets and scheduling constraints when scaling down
# - It should not remove nodes that run non-evictable Pods, mirror/static Pods, or Pods blocked by PDBs

---
# Example workload that may trigger node scale-up
# If the cluster does not have enough allocatable CPU/memory for this Deployment, its Pods stay Pending, and Cluster Autoscaler may add nodes if the node group can scale

apiVersion: apps/v1
kind: Deployment
metadata:
  name: cpu-hungry-app
  labels:
    app: cpu-hungry-app
spec:
  replicas: 6
  selector:
    matchLabels:
      app: cpu-hungry-app
  template:
    metadata:
      labels:
        app: cpu-hungry-app
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: nginxinc/nginx-unprivileged:1.25-alpine
          ports:
            - containerPort: 8080
          securityContext:
            runAsUser: 101
            runAsGroup: 101
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 750m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi

---
# Example PodDisruptionBudget
# Cluster Autoscaler checks whether Pods can be evicted before removing a node
# If this PDB would be violated, scale-down may be blocked
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cpu-hungry-app-pdb
spec:
  minAvailable: 4
  selector:
    matchLabels:
      app: cpu-hungry-app

---
# ServiceAccount used by Cluster Autoscaler.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: cluster-autoscaler
  namespace: kube-system
automountServiceAccountToken: true

---
# ClusterRole with the common permissions Cluster Autoscaler needs
# Real provider manifests may include extra permissions depending on Kubernetes version/provider

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-autoscaler
rules:
  - apiGroups: [""]
    resources: ["events", "endpoints"]
    verbs: ["create", "patch"]
  - apiGroups: [""]
    resources: ["pods/eviction"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["pods/status"]
    verbs: ["update"]
  - apiGroups: [""]
    resources: ["endpoints"]
    resourceNames: ["cluster-autoscaler"]
    verbs: ["get", "update"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["watch", "list", "get", "update"]
  - apiGroups: [""]
    resources: ["pods", "services", "replicationcontrollers", "persistentvolumeclaims", "persistentvolumes"]
    verbs: ["watch", "list", "get"]
  - apiGroups: ["apps"]
    resources: ["daemonsets", "replicasets", "statefulsets"]
    verbs: ["watch", "list", "get"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["watch", "list"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses", "csinodes", "csidrivers", "csistoragecapacities"]
    verbs: ["watch", "list", "get"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["create"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    resourceNames: ["cluster-autoscaler"]
    verbs: ["get", "update"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-autoscaler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-autoscaler
subjects:
  - kind: ServiceAccount
    name: cluster-autoscaler
    namespace: kube-system

---
# Extra Role for leader election/configmap access inside kube-system

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cluster-autoscaler
  namespace: kube-system
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["cluster-autoscaler-status", "cluster-autoscaler-priority-expander"]
    verbs: ["delete", "get", "update", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cluster-autoscaler
  namespace: kube-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cluster-autoscaler
subjects:
  - kind: ServiceAccount
    name: cluster-autoscaler
    namespace: kube-system

---
# Example Cluster Autoscaler Deployment for AWS
# This is provider-specific. For GKE, AKS, EKS managed node groups, Karpenter, or other providers, the command arguments and installation method can differ.

# Replace:
# - <CLUSTER_NAME> with the actual cluster name.
# - <AWS_REGION> with the region, such as us-east-1
# - The image tag with the version that matches your Kubernetes minor version

apiVersion: apps/v1
kind: Deployment
metadata:
  name: cluster-autoscaler
  namespace: kube-system
  labels:
    app: cluster-autoscaler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cluster-autoscaler
  template:
    metadata:
      labels:
        app: cluster-autoscaler
      annotations:
        cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
    spec:
      serviceAccountName: cluster-autoscaler
      priorityClassName: system-cluster-critical
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cluster-autoscaler
          image: registry.k8s.io/autoscaling/cluster-autoscaler:v1.30.3
          imagePullPolicy: IfNotPresent
          command:
            - ./cluster-autoscaler
            - --v=4
            - --stderrthreshold=info
            - --cloud-provider=aws
            - --skip-nodes-with-local-storage=false
            - --expander=least-waste
            - --balance-similar-node-groups
            - --node-group-auto-discovery=asg:tag=k8s.io/cluster-autoscaler/enabled,k8s.io/cluster-autoscaler/<CLUSTER_NAME>
          env:
            - name: AWS_REGION
              value: <AWS_REGION>
          resources:
            requests:
              cpu: 100m
              memory: 300Mi
            limits:
              cpu: 500m
              memory: 600Mi
          securityContext:
            runAsUser: 65534
            runAsGroup: 65534
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: ssl-certs
              mountPath: /etc/ssl/certs/ca-certificates.crt
              readOnly: true
      volumes:
        - name: ssl-certs
          hostPath:
            path: /etc/ssl/certs/ca-certificates.crt
            type: FileOrCreate


# Common commands:
# kubectl -n kube-system get deploy cluster-autoscaler
# kubectl -n kube-system logs deploy/cluster-autoscaler
# kubectl get nodes
# kubectl get pods -A --field-selector=status.phase=Pending
# kubectl describe pod <PENDING_POD_NAME>
#
# Common reasons scale-up does not happen:
# - Pod requests are too large for any possible node type.
# - The node group is already at max size.
# - Node selector, node affinity, taints, or tolerations prevent scheduling.
# - The cloud provider integration or IAM permissions are missing.
# - The Cluster Autoscaler version does not match the cluster version well.
#
# Common reasons scale-down does not happen:
# - PodDisruptionBudget blocks eviction.
# - A Pod uses local storage and --skip-nodes-with-local-storage is true.
# - A Pod is not managed by a controller.
# - A node has kube-system Pods that are not safe to evict.
# - The node has not been underutilized long enough.
