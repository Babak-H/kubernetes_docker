# CronJob

apiVersion: batch/v1
kind: CronJob
metadata:
  name: reporting-cron-job
spec:
  # all cronJobs should have a schedule to run
  schedule: "*/1 * * *"
  # this section is same as Job
  jobTemplate:
    spec:
      completions: 3
      parallelism: 3
      backoffLimit: 10
      template:
        spec:
          containers:
            - name: reporting-tool
              image: reporting-tool
          restartPolicy: Never

