---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-configmap
data:
  DB_CONNECTION: pg
  DB_HOST: postgres-cluster-ip-service
  DB_PORT: "5432"
  DB_USER: postgres
  DB_DATABASE: notesdb
  # File-like key stored as multiline text
  db.properties: |
    VERSION=12
    BACKUP=3

---
# kubectl create configmap time-config -n dvl1987 --from-literal=TIME_FREQ=10
# kubectl get configmap -n dvl1987

apiVersion: v1
kind: ConfigMap
metadata:
  name: time-config
  namespace: dvl1987
data:
  TIME_FREQ: "10"

---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
# Opaque is the default Secret type in Kubernetes — it means the Secret contains arbitrary, unstructured key-value data that Kubernetes makes no assumptions about
# The word "Opaque" essentially means: "I don't know what this is, and I don't care — just store it."
type: Opaque
data:
  # Base64-encoded password value.
  password: NjNlYVFCOXd0THFtTkJwZw==

---
# Pod reading one ConfigMap key as an environment variable
# this will get only one key-value pair from the ConfigMap, not the whole thing

apiVersion: v1
kind: Pod
metadata:
  name: webapp-color
  labels:
    app: webapp-color
spec:
  securityContext:
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: webapp-color
      image: kodekloud/webapp-color:v1
      env:
        - name: APP_COLOR
          valueFrom:
            configMapKeyRef:
              name: webapp-config-map
              key: APP_COLOR
      securityContext:
        runAsUser: 1000
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi

---
# Pod loading all key-value pairs from a Secret as environment variables

apiVersion: v1
kind: Pod
metadata:
  name: webapp-pod
  labels:
    app: webapp-pod
spec:
  securityContext:
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: webapp
      image: kodekloud/simple-webapp-mysql:v1
      envFrom:
        - secretRef:
            name: db-secret
      securityContext:
        runAsUser: 1000
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-deployment
  labels:
    component: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      component: postgres
  template:
    metadata:
      labels:
        component: postgres
    spec:
      securityContext:
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: fhsinchy/notes-postgres:1.0.0
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            - name: POSTGRES_DB
              value: notesdb
          securityContext:
            runAsUser: 999
            runAsGroup: 999
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi

---
# Create a ConfigMap from literals and mount it into a Pod as files under /etc/lala
# k create configmap cm-vol --from-literal=var1=val1 --from-literal=var2=val2

apiVersion: v1
kind: Pod
metadata:
  labels:
    app: nginx-configmap-volume
  name: nginx-configmap-volume
spec:
  securityContext:
    seccompProfile:
      type: RuntimeDefault
  volumes:
    - name: my-vol
      configMap:
        name: cm-vol
  containers:
    - name: nginx
      image: nginxinc/nginx-unprivileged:1.25-alpine
      ports:
        - containerPort: 8080
      volumeMounts:
        - name: my-vol
          mountPath: /etc/lala
          readOnly: true
      securityContext:
        runAsUser: 101
        runAsGroup: 101
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi

---
# create a secret and then mount it as volume in a Pod
# k create secret generic mysecret2 --from-literal=username=babak-admin

apiVersion: v1
kind: Pod
metadata:
  labels:
    app: nginx-secret-env
  name: nginx-secret-env
spec:
  securityContext:
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: nginx
      image: nginxinc/nginx-unprivileged:1.25-alpine
      ports:
        - containerPort: 8080
      env:
        - name: USERNAME
          valueFrom:
            secretKeyRef:
              name: mysecret2
              key: username
      securityContext:
        runAsUser: 101
        runAsGroup: 101
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi

---
# Create a Secret named 'my-secret' of type 'kubernetes.io/ssh-auth' in the namespace 'secret-ops'. Define a single key named 'ssh-privatekey', and point it to the file 'id_rsa' in this directory.
# here we equate the entire content of file id_rsa to variable ssh-privatekey
# k create secret generic my-secret -n secret-ops --type="kubernetes.io/ssh-auth" --from-file=ssh-privatekey=id_rsa
# or

apiVersion: v1
kind: Secret
metadata:
  name: my-secret
  namespace: secret-ops
type: kubernetes.io/ssh-auth
data:
  # Base64-encoded private key content.
  ssh-privatekey: "..."

---
# Create a Pod named 'consumer' with the image 'nginx' in the namespace 'secret-ops', and consume the Secret as Volume. Mount the Secret as Volume to the path /var/app with read-only access

apiVersion: v1
kind: Pod
metadata:
  labels:
    app: consumer
  name: consumer
  namespace: secret-ops
spec:
  securityContext:
    seccompProfile:
      type: RuntimeDefault
  volumes:
    - name: secret-vol
      secret:
        secretName: my-secret
        # In this Kubernetes volume definition, optional: true means the Pod will still start even if the secret my-secret doesn't exis
        # By default (optional: false), if a referenced secret doesn't exist, the Pod will fail to start and stay in a Pending state
        optional: true
  containers:
    - name: consumer
      image: nginxinc/nginx-unprivileged:1.25-alpine
      ports:
        - containerPort: 8080
      volumeMounts:
        - name: secret-vol
          mountPath: /var/app
          readOnly: true
      securityContext:
        runAsUser: 101
        runAsGroup: 101
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi
