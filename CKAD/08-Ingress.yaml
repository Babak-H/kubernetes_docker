# Ingress resources route external HTTP/HTTPS traffic to Services
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-service
  annotations:
    # Enable regex paths for ingress-nginx and rewrite captured paths
    nginx.ingress.kubernetes.io/use-regex: "true"
    # you want to rewrite the URL target in place. (used for redirection to prevent 404 errors)
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  ingressClassName: nginx
  rules:
    - http:
        # configuration regarding the individual path routing
        paths:
          # Frontend service: /, /test1, and other non-api paths
          - path: /(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: client-clusterip-service
                port:
                  number: 8080
          # Backend service: /api and /api/*
          - path: /api/?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: api-clusterip-service
                port:
                  number: 3000

---
# Ingress with basic authentication

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: secure-routing
  annotations:
    nginx.ingress.kubernetes.io/auth-type: basic
    # name of the secret that contains the user/password definitions
    nginx.ingress.kubernetes.io/auth-secret: basic-auth
    # message to display with an appropriate context why the authentication is required
    nginx.ingress.kubernetes.io/auth-realm: "Authentication Required"
spec:
  ingressClassName: nginx
  rules:
    - host: queue.fleetman.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fleetman-queue-clusterip-svc
                port:
                  number: 8161

---
# Ingress with multiple path prefixes under one host

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dashboard-ingress
  namespace: kubernetes-dashboard
spec:
  ingressClassName: nginx
  rules:
    - host: dashboard.com
      http:
        paths:
          - path: /analytics
            pathType: Prefix
            backend:
              service:
                name: analytics-service
                port:
                  number: 3000
          - path: /shopping
            pathType: Prefix
            backend:
              service:
                name: shopping-service
                port:
                  number: 8080

---
# Ingress routing two hosts to two different Services

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-wear-watch
  annotations:
    # replaces all the non-mentioned addresses after /? to /
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: wear.my-online-store.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wear-service
                port:
                  number: 80
    - host: watch.my-online-store.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: watch-service
                port:
                  number: 80

---
# the service video-service should be accessed from "http://watch.ecom-store.com:30093/video"
# the service apparels-service should be accessed from "http://apparels.ecom-store.com:30093/wear"
# here 30093 is the port used by "Ingress controller"
# if we run "k get svc" we can see that both services are running on port 8080, traffic comes to port
# 30093 on ingress, then we redirect it to port 8080 on services

# Virtual-host routing example
# External traffic reaches the Ingress controller node port, then routes to Services on port 8080

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-vh-routing
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: watch.ecom-store.com
      http:
        paths:
          - path: /video
            pathType: Prefix
            backend:
              service:
                name: video-service
                port:
                  number: 8080
    - host: apparels.ecom-store.com
      http:
        paths:
          - path: /wear
            pathType: Prefix
            backend:
              service:
                name: apparels-service
                port:
                  number: 8080


