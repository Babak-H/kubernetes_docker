---
apiVersion: v1 # API version for Pod resources.
kind: Pod # Resource type.
metadata:
  name: mysql # Pod name.
  labels:
    # Labels can be used by Services, Deployments, and selectors to find this Pod.
    app: mysql
    component: db
spec:
  securityContext:
    # run the container with the container runtime’s default seccomp security profile. it limits which Linux system calls the container process is allowed to make
    # Reduces the container’s attack surface, Blocks some risky or unusual kernel-level operations, Satisfies common Kubernetes security linters
    # Uses the default safe profile from the runtime, such as containerd or Docker
    seccompProfile:
      type: RuntimeDefault
  # Restart only if the container fails; do not restart after a successful completion.
  restartPolicy: OnFailure
  containers:
    - name: mysql # Container name.
      image: mysql:5.7 # Container image pinned to a specific tag.
      ports:
        # Documents the container port; it does not publish the port outside the Pod.
        - containerPort: 3306
      # Environment variables passed to the container.
      env:
        - name: MYSQL_ROOT_PASSWORD
          value: "password"
        - name: MYSQL_DATABASE
          value: "fleet-man"
      # Override the container process and keep the Pod running for testing.
      command: ["/bin/bash", "-c"]
      args: ["sleep 4800"]
      # this is the securityContext, only for this container inside the pod
      securityContext:
        # Run as the MySQL user used by the official image.
        runAsUser: 999
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      # the min and max resource limit for this container inside the pod
      resources:
        # Min resource
        requests:
          cpu: 100m
          memory: 256Mi
        # Max resource
        limits:
          cpu: 500m
          memory: 512Mi

---
apiVersion: v1
kind: Pod
metadata:
  name: sidecar-container-demo
spec:
  securityContext:
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  containers:
    # SideCar Container of the Pod
    - image: busybox:1.36.1
      name: sidecar-container
      # Kubernetes command maps to Docker ENTRYPOINT.
      command: ["/bin/sh"]
      # Kubernetes args maps to Docker CMD and is passed to the entrypoint.
      args: ["-c", "while true; do echo $(date -u) 'Hi I am from Sidecar container' >> /var/log/index.html; sleep 5; done"]
      volumeMounts:
        # Both containers access the same shared volume.
        - name: var-logs
          mountPath: /var/log
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
    # Main Container of the Pod
    - image: nginx:1.25.5
      name: main-container
      ports:
        - containerPort: 80
      volumeMounts:
        - mountPath: /usr/share/nginx/html
          name: var-logs
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi

  volumes:
    - name: var-logs
      emptyDir: {} # Local, non-persistent volume created for this Pod.

---
apiVersion: v1
kind: Pod
metadata:
  name: command-demo
  labels:
    purpose: demonstrate-command
spec:
  securityContext:
    seccompProfile:
      type: RuntimeDefault
  # Restart only if the container fails; do not restart after a successful completion.
  restartPolicy: OnFailure
  containers:
    - name: command-demo-container
      image: debian:12.5
      command: ["printenv"]
      args: ["HOSTNAME", "KUBERNETES_PORT"]
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi

# Direct command: printenv HOSTNAME KUBERNETES_PORT
# Docker equivalent: docker run --rm debian printenv HOSTNAME KUBERNETES_PORT

---
# Access an environment variable inside a command.
apiVersion: v1
kind: Pod
metadata:
  name: command-demo-1
  labels:
    purpose: demonstrate-command-1
spec:
  securityContext:
    seccompProfile:
      type: RuntimeDefault
  restartPolicy: OnFailure
  containers:
    - name: command-demo-container-1
      image: debian:12.5
      env:
        - name: MESSAGE
          value: "hello world"
      command: ["/bin/echo"]
      args: ["$(MESSAGE)"]
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi

