---
# Pod with an NFS volume mounted directly, without a PVC.
apiVersion: v1
kind: Pod
metadata:
  name: test-pod
spec:
  securityContext:
    seccompProfile:
      type: RuntimeDefault
  volumes:
    - name: test-volume
      nfs:
        server: my-nfs-server.example.com
        path: /my-nfs-volume
        readOnly: true
  containers:
    - image: registry.k8s.io/test-webserver
      name: test-container
      volumeMounts:
        - mountPath: /my-nfs-data
          name: test-volume
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi

# Sharing storage between Kubernetes Pods:
# To share a volume between multiple Pods, create a PVC with access mode ReadWriteMany.
# NFS is a common backend for shared volumes.
#
# When editing a running Pod directly, only limited fields are mutable, such as:
# container image, init container image, activeDeadlineSeconds, and tolerations.

---
# Resource requests and limits are configured per container.
apiVersion: v1
kind: Pod
metadata:
  labels:
    run: nginx
  name: nginx-resources
spec:
  securityContext:
    seccompProfile:
      type: RuntimeDefault
  containers:
    - image: nginx:1.25.5
      name: nginx
      # Requests reserve scheduler capacity; limits cap maximum usage.
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          # CPU can be expressed as cores or millicores; 200m means 0.2 CPU.
          cpu: 200m
          memory: 512Mi
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]

---
# Create a Pod with an nginx container exposed on port 80.
# Add a busybox init container that downloads a page into an emptyDir volume.
# Mount the volume at /usr/share/nginx/html in nginx and /work-dir in the init container.
# k run nginx --image=nginx --port=80 --dry-run=client -o yaml > po.yaml
apiVersion: v1
kind: Pod
metadata:
  labels:
    run: nginx
  name: nginx
spec:
  securityContext:
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  volumes:
    - name: vol
      emptyDir: {}
  initContainers:
    - name: busybox
      image: busybox:1.36.1
      volumeMounts:
        - name: vol
          mountPath: /work-dir
      # Download a page into /work-dir so nginx can serve it as index.html.
      command: ["/bin/sh", "-c", "wget -O /work-dir/index.html http://neverssl.com/online"]
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
  containers:
    - image: nginx:1.25.5
      name: nginx
      ports:
        - containerPort: 80
      volumeMounts:
        - mountPath: /usr/share/nginx/html
          name: vol
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi

# Pod with a for-loop command.
# command: ["/bin/sh", "-c", "for word in 1 2 3 4 5; do echo $word; done"]

---
# YAML anchors and aliases let you define values once and reuse them.
# Anchor &: define reusable values.
# Alias *: reference the anchor.
apiVersion: v1
kind: Pod
metadata:
  name: my-pod
  labels: &labels
    app: my-app
    tier: frontend
spec:
  securityContext:
    seccompProfile:
      type: RuntimeDefault
  # This reuses the labels map as a node selector for demonstration purposes.
  nodeSelector: *labels
  containers:
    - name: my-container
      image: my-image:1.0.0
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
    - name: another-container
      image: another-image:1.0.0
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi

---
# Create a Pod named multi-container-playground in the default Namespace.
# It has three containers and a shared emptyDir volume that is not persisted or shared with other Pods.
# c1 exposes the node name as MY_NODE_NAME.
# c2 writes the date to date.log every second.
# c3 tails date.log to stdout.
# kubectl run multi-container-playground --image=nginx:1.17.6-alpine --dry-run=client -o yaml > test.yaml
apiVersion: v1
kind: Pod
metadata:
  labels:
    run: multi-container-playground
  name: multi-container-playground
spec:
  securityContext:
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault

  volumes:
    - name: vol
      emptyDir: {}

  containers:

    - image: nginx:1.17.6-alpine
      name: c1
      env:
        - name: MY_NODE_NAME
          valueFrom:
            # here we are referncing value from another part of the same kubernetes Resource (name of the Node that this Pod is running on)
            fieldRef:
              fieldPath: spec.nodeName
      volumeMounts:
        - name: vol
          mountPath: /vol
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi

    - image: busybox:1.31.1
      name: c2
      command: ["sh", "-c", "while true; do date >> /vol/date.log; sleep 1; done"]
      volumeMounts:
        - name: vol
          mountPath: /vol
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi

    - image: busybox:1.31.1
      name: c3
      command: ["sh", "-c", "tail -f /vol/date.log"]
      volumeMounts:
        - name: vol
          mountPath: /vol
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi

# Check the environment variable and logs:
# kubectl exec multi-container-playground -c c1 -- env | grep MY_NODE_NAME
# kubectl logs multi-container-playground -c c3
