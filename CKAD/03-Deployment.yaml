---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
  namespace: development
  labels:
    app: notes
    component: api
spec:
  # Minimum time a new Pod must be ready before it is considered available, default is Zero
  minReadySeconds: 2
  replicas: 3
  selector:
    # This selector must match spec.template.metadata.labels.
    matchLabels:
      app: notes
      component: api
  template:
    metadata:
      labels:
        app: notes
        component: api
    spec:
      securityContext:
        # fsGroup => Sets a filesystem group ID for mounted volumes, so the container can read/write files in those volumes.
        # Kubernetes may change mounted volume ownership/permissions so files are accessible by group 2000.
        fsGroup: 2000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: fhsinchy/notes-api:1.0.0
          ports:
            - containerPort: 3000 # "Target port" used by the Service.
          env:
            - name: DB_CONNECTION
              value: pg
            - name: DB_HOST
              value: postgres-clusterip-service
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: postgres
            - name: DB_DATABASE
              value: notesdb
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            # Enabling debug logs is done by appending —-verbosity=debug to the command of the main container in the deployment k8s yaml.
            # debug setting. Prefer app-specific environment variables over overriding command.
            - name: VERBOSITY
              value: debug
          securityContext:
            runAsUser: 1000
            # runAsGroup => Sets the primary Linux group ID that the container process runs as, GID 3000
            runAsGroup: 3000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

---
apiVersion: v1
kind: Service
metadata:
  name: api-loadbalancer-service
  namespace: development
  labels:
    app: notes
    component: api
spec:
  type: LoadBalancer
  selector:
    # This must match the Deployment Pod template labels. "spec.template.metadata.labels"
    app: notes
    component: api
  ports:
    - name: http
      port: 3000 # Service port.
      targetPort: 3000 # Container port.

---
# Multi-container with sidecar pod Deployment.
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: nginx-webapp
  name: nginx-webapp
spec:
  replicas: 5
  selector:
    matchLabels:
      app: nginx-webapp
  template:
    metadata:
      labels:
        app: nginx-webapp
    spec:
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:

        - name: sidecar-container-1
          image: busybox:1.36.1
          command: ["/bin/sh"]
          args: ["-c", "while true; do echo $(date -u) 'Hi I am from Sidecar container 1' >> /var/log/index.html; sleep 5; done"]
          volumeMounts:
            - mountPath: /var/log
              name: var-logs
          securityContext:
            runAsUser: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi

        # Sidecar 2 also writes data to the shared volume.
        - name: sidecar-container-2
          image: busybox:1.36.1
          command: ["/bin/sh"]
          args: ["-c", "while true; do echo $(date -u) 'Hi I am from Sidecar container 2' >> /var/log/index.html; sleep 5; done"]
          volumeMounts:
            - name: var-logs
              mountPath: /var/log
          securityContext:
            runAsUser: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi

        # Main container serves the content written by the sidecars.
        - name: main-container
          image: nginx:1.25.5
          ports:
            - containerPort: 80
          volumeMounts:
            - name: var-logs
              mountPath: /usr/share/nginx/html
          # the official nginx image commonly starts as root so it can do a few setup tasks, especially:
          # bind to privileged port 80, create/write runtime files such as PID files and cache/temp directories, switch worker processes internally to the nginx user depending on image config
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

      volumes:
        - name: var-logs
          emptyDir: {}

---
# Deployment with PVC, Secret, and ConfigMap volumes.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elastic
  labels:
    app: elastic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elastic
  template:
    metadata:
      labels:
        app: elastic
    spec:
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: elastic-container
          image: elasticsearch:8.13.4
          ports:
            - containerPort: 9200
          volumeMounts:
            - mountPath: /var/lib/data
              name: es-persistent-storage
            - mountPath: /var/lib/secret
              name: es-secret-dir
              # set the volumes from secret and configmap to read-only so no process can edit them (as we reference thes values somewhere)
              readOnly: true
            - mountPath: /var/lib/config
              name: es-config-dir
              readOnly: true
          securityContext:
            runAsUser: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi

      volumes:
        - name: es-persistent-storage
          persistentVolumeClaim:
            claimName: es-pv-claim
        # Volume populated from a Secret.
        - name: es-secret-dir
          secret:
            secretName: es-secret
        # Volume populated from a ConfigMap.
        - name: es-config-dir
          configMap:
            name: es-config-map

---
# kubectl create deployment redis --image=redis:7.2.5-alpine --replicas=1 --dry-run=client -o yaml > redis.yaml
# vi reis.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      securityContext:
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: redis:7.2.5-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsUser: 999
            runAsGroup: 999
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /redis-master-data
            - name: redis-config
              mountPath: /redis-master
              readOnly: true
      volumes:
        - name: data
          emptyDir: {}
        - name: redis-config
          configMap:
            name: redis-config
