namespace:
  name: mddz
  create: false
  labels:
    name: mddz

imagePullSecrets:
  - name: my-reg-key

automountServiceAccountToken: false

serviceAccounts:
  create: true
  automountServiceAccountToken: false
  names:
    - service-registry-sa
    - config-server-sa
    - cloud-admin-sa
    - configuration-fetcher-sa
    - notification-fetcher-sa
    - file-handler-sa
    - email-sender-sa
    - report-uploader-sa
    - box-connector-sa
    - filebeat-sa
    - logstash-sa

secrets:
  create: false
  items:
    eureka-pass-secret:
      type: Opaque
      stringData:
        eureka-pass: ""
    encrypt-key-secret:
      type: Opaque
      stringData:
        ENCRYPT_KEY: ""
        encrypt-key: ""
    my-ssh-key:
      type: Opaque
      stringData:
        id_rsa: ""

configMaps:
  create: true
  items:
    hosts:
      data:
        known-hosts: ""
    service-registry-config:
      data:
        SPRING_PROFILES_ACTIVE: "remote,dev"
        mddz_EUREKA_PEER1_HOST: "service-registry-service-1"
        mddz_EUREKA_PEER2_HOST: "service-registry-service-2"
        mddz_EUREKA_PEER3_HOST: "service-registry-service-3"
        JAVA_TOOL_OPTIONS: "-Xms256m -Xmx410m"
    config-server-config:
      data:
        SPRING_PROFILES_ACTIVE: "remote,dev"
        mddz_EUREKA_PEER1_HOST: "service-registry-service-1"
        mddz_EUREKA_PEER2_HOST: "service-registry-service-2"
        mddz_EUREKA_PEER3_HOST: "service-registry-service-3"
        EUREKA_INSTANCE_HOSTNAME: "config-server-service"
        mddz_EUREKA_PORT: "8761"
        JAVA_TOOL_OPTIONS: "-Xms256m -Xmx410m"
        SPRING_CLOUD_CONFIG_SERVER_GIT_STRICTHOSTKEYCHECKING: "false"
        SPRING_CLOUD_CONFIG_SERVER_GIT_IGNORE_LOCAL_SSH_SETTINGS: "true"
    cloud-admin-config:
      data:
        SPRING_PROFILES_ACTIVE: "remote,dev"
        mddz_EUREKA_PEER1_HOST: "service-registry-service-1"
        mddz_EUREKA_PEER2_HOST: "service-registry-service-2"
        mddz_EUREKA_PEER3_HOST: "service-registry-service-3"
        mddz_EUREKA_PORT: "8761"
        JAVA_TOOL_OPTIONS: "-Xms256m -Xmx410m"
    configuration-fetcher-config:
      data:
        SPRING_PROFILES_ACTIVE: "remote,dev"
        mddz_EUREKA_PEER1_HOST: "service-registry-service-1"
        mddz_EUREKA_PEER2_HOST: "service-registry-service-2"
        mddz_EUREKA_PEER3_HOST: "service-registry-service-3"
        mddz_EUREKA_PORT: "8761"
        JAVA_TOOL_OPTIONS: "-Xms256m -Xmx410m"
    notification-fetcher-config:
      data:
        SPRING_PROFILES_ACTIVE: "remote,dev"
        mddz_EUREKA_PEER1_HOST: "service-registry-service-1"
        mddz_EUREKA_PEER2_HOST: "service-registry-service-2"
        mddz_EUREKA_PEER3_HOST: "service-registry-service-3"
        mddz_EUREKA_PORT: "8761"
        JAVA_TOOL_OPTIONS: "-Xms256m -Xmx410m"
    file-handler-config:
      data:
        SPRING_PROFILES_ACTIVE: "remote,dev"
        mddz_EUREKA_PEER1_HOST: "service-registry-service-1"
        mddz_EUREKA_PEER2_HOST: "service-registry-service-2"
        mddz_EUREKA_PEER3_HOST: "service-registry-service-3"
        mddz_EUREKA_PORT: "8761"
        JAVA_TOOL_OPTIONS: "-Xms256m -Xmx410m"
    email-sender-config:
      data:
        SPRING_PROFILES_ACTIVE: "remote,dev"
        mddz_EUREKA_PEER1_HOST: "service-registry-service-1"
        mddz_EUREKA_PEER2_HOST: "service-registry-service-2"
        mddz_EUREKA_PEER3_HOST: "service-registry-service-3"
        mddz_EUREKA_PORT: "8761"
        JAVA_TOOL_OPTIONS: "-Xms256m -Xmx410m"
    report-uploader-config:
      data:
        SPRING_PROFILES_ACTIVE: "remote,dev"
        mddz_EUREKA_PEER1_HOST: "service-registry-service-1"
        mddz_EUREKA_PEER2_HOST: "service-registry-service-2"
        mddz_EUREKA_PEER3_HOST: "service-registry-service-3"
        mddz_EUREKA_PORT: "8761"
        JAVA_TOOL_OPTIONS: "-Xms256m -Xmx410m"
    box-connector-config:
      data:
        SPRING_PROFILES_ACTIVE: "remote,dev"
        mddz_EUREKA_PEER1_HOST: "service-registry-service-1"
        mddz_EUREKA_PEER2_HOST: "service-registry-service-2"
        mddz_EUREKA_PEER3_HOST: "service-registry-service-3"
        mddz_EUREKA_PORT: "8761"
        JAVA_TOOL_OPTIONS: "-Xms256m -Xmx410m"
    filebeat-yml:
      data:
        filebeat.yml: |-
          http.enabled: true
          http.host: 0.0.0.0
          http.port: 8888
          filebeat.inputs:
            - type: filestream
              id: service-registry-peer1
              paths: ["/usr/share/filebeat/logs/service-registry/peer1/*.log"]
            - type: filestream
              id: service-registry-peer2
              paths: ["/usr/share/filebeat/logs/service-registry/peer2/*.log"]
            - type: filestream
              id: service-registry-peer3
              paths: ["/usr/share/filebeat/logs/service-registry/peer3/*.log"]
            - type: filestream
              id: config-server
              paths: ["/usr/share/filebeat/logs/config-server/*.log"]
            - type: filestream
              id: cloud-admin
              paths: ["/usr/share/filebeat/logs/cloud-admin/*.log"]
            - type: filestream
              id: email-sender
              paths: ["/usr/share/filebeat/logs/email-sender/*.log"]
            - type: filestream
              id: report-uploader
              paths: ["/usr/share/filebeat/logs/report-uploader/*.log"]
            - type: filestream
              id: configuration-fetcher
              paths: ["/usr/share/filebeat/logs/configuration-fetcher/*.log"]
            - type: filestream
              id: file-handler
              paths: ["/usr/share/filebeat/logs/file-handler/*.log"]
            - type: filestream
              id: box-connector
              paths: ["/usr/share/filebeat/logs/box-connector/*.log"]
            - type: filestream
              id: notification-fetcher
              paths: ["/usr/share/filebeat/logs/notification-fetcher/*.log"]
          output.logstash:
            hosts: ["logstash-service:5044"]
    logstash-config:
      data:
        ENVIRONMENT: "dev"
        LS_JAVA_OPTS: "-Xms512m -Xmx512m"
    logstash-conf:
      data:
        logstash.conf: |-
          input {
            beats {
              port => 5044
            }
          }

          filter {
            mutate {
              add_field => { "environment" => "${ENVIRONMENT:dev}" }
            }
          }

          output {
            stdout {
              codec => rubydebug
            }
          }
    logstash-yml:
      data:
        logstash.yml: |-
          http.host: "0.0.0.0"
          http.port: 9600
          path.data: /usr/share/logstash/data

persistence:
  enabled: true
  claims:
    peer1-logs-claim: &logClaim
      enabled: true
      storageClassName: pxb-Rs-xf-oc
      accessModes:
        - ReadWriteMany
      size: 0.2Gi
    peer2-logs-claim:
      <<: *logClaim
    peer3-logs-claim:
      <<: *logClaim
    cloud-admin-logs-claim:
      <<: *logClaim
    config-server-logs-claim:
      <<: *logClaim
    email-sender-logs-claim:
      <<: *logClaim
    report-uploader-logs-claim:
      <<: *logClaim
    configuration-fetcher-logs-claim:
      <<: *logClaim
    file-handler-logs-claim:
      <<: *logClaim
    box-connector-logs-claim:
      <<: *logClaim
    notification-fetcher-logs-claim:
      <<: *logClaim

workloads:
  service-registry-1:
    enabled: true
    replicas: 1
    component: backend
    serviceAccountName: service-registry-sa
    terminationGracePeriodSeconds: 30
    podAnnotations: &istioSidecarResources
      sidecar.istio.io/proxyCPU: 80m
      sidecar.istio.io/proxyCPULimit: 100m
      sidecar.istio.io/proxyMemory: 150Mi
      sidecar.istio.io/proxyMemoryLimit: 300Mi
      prometheus.io/scrape: "true"
      prometheus.io/port: "8761"
    podSecurityContext: &defaultPodSecurityContext
      fsGroup: 10001
      seccompProfile:
        type: RuntimeDefault
    volumes:
      - name: peer1-logs
        persistentVolumeClaim:
          claimName: peer1-logs-claim
      - name: tmp
        emptyDir: {}
    image:
      repository: "registry.code.***.com/mddz/service-registry"
      tag: "1.0.0"
    imagePullPolicy: Always
    securityContext: &readonlySpringSecurityContext
      runAsUser: 10000
      runAsGroup: 10001
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
    ports:
      - name: http
        containerPort: 8761
        protocol: TCP
    env:
      - name: INSTANCE
        value: peer1
      - name: INSTANCE_NAME
        valueFrom:
          fieldRef:
            fieldPath: metadata.name
      - name: ENCRYPT_KEY
        valueFrom:
          secretKeyRef:
            name: encrypt-key-secret
            key: encrypt-key
    envFrom:
      - configMapRef:
          name: service-registry-config
    resources: &smallSpringResources
      requests:
        cpu: 50m
        memory: 150Mi
      limits:
        cpu: 300m
        memory: 512Mi
    probes: &serviceRegistryProbes
      livenessProbe:
        httpGet:
          path: /actuator/health/liveness
          port: http
        initialDelaySeconds: 20
        periodSeconds: 10
      readinessProbe:
        httpGet:
          path: /actuator/health/readiness
          port: http
        initialDelaySeconds: 10
        periodSeconds: 5
      startupProbe:
        httpGet:
          path: /actuator/health
          port: http
        failureThreshold: 30
        periodSeconds: 5
    volumeMounts:
      - name: peer1-logs
        mountPath: /home/mddz/logs/service-registry
        subPathExpr: $(INSTANCE_NAME)
      - name: tmp
        mountPath: /tmp

  service-registry-2:
    enabled: true
    replicas: 1
    component: backend
    serviceAccountName: service-registry-sa
    terminationGracePeriodSeconds: 30
    podAnnotations:
      <<: *istioSidecarResources
    podSecurityContext:
      <<: *defaultPodSecurityContext
    volumes:
      - name: peer2-logs
        persistentVolumeClaim:
          claimName: peer2-logs-claim
      - name: tmp
        emptyDir: {}
    image:
      repository: "registry.code.***.com/mddz/service-registry"
      tag: "1.0.0"
    imagePullPolicy: Always
    securityContext:
      <<: *readonlySpringSecurityContext
    ports:
      - name: http
        containerPort: 8761
        protocol: TCP
    env:
      - name: INSTANCE
        value: peer2
      - name: INSTANCE_NAME
        valueFrom:
          fieldRef:
            fieldPath: metadata.name
      - name: ENCRYPT_KEY
        valueFrom:
          secretKeyRef:
            name: encrypt-key-secret
            key: encrypt-key
    envFrom:
      - configMapRef:
          name: service-registry-config
    resources:
      <<: *smallSpringResources
    probes:
      <<: *serviceRegistryProbes
    volumeMounts:
      - name: peer2-logs
        mountPath: /home/mddz/logs/service-registry
        subPathExpr: $(INSTANCE_NAME)
      - name: tmp
        mountPath: /tmp

  service-registry-3:
    enabled: true
    replicas: 1
    component: backend
    serviceAccountName: service-registry-sa
    terminationGracePeriodSeconds: 30
    podAnnotations:
      <<: *istioSidecarResources
    podSecurityContext:
      <<: *defaultPodSecurityContext
    volumes:
      - name: peer3-logs
        persistentVolumeClaim:
          claimName: peer3-logs-claim
      - name: tmp
        emptyDir: {}
    image:
      repository: "registry.code.***.com/mddz/service-registry"
      tag: "1.0.0"
    imagePullPolicy: Always
    securityContext:
      <<: *readonlySpringSecurityContext
    ports:
      - name: http
        containerPort: 8761
        protocol: TCP
    env:
      - name: INSTANCE
        value: peer3
      - name: INSTANCE_NAME
        valueFrom:
          fieldRef:
            fieldPath: metadata.name
      - name: ENCRYPT_KEY
        valueFrom:
          secretKeyRef:
            name: encrypt-key-secret
            key: encrypt-key
    envFrom:
      - configMapRef:
          name: service-registry-config
    resources:
      <<: *smallSpringResources
    probes:
      <<: *serviceRegistryProbes
    volumeMounts:
      - name: peer3-logs
        mountPath: /home/mddz/logs/service-registry
        subPathExpr: $(INSTANCE_NAME)
      - name: tmp
        mountPath: /tmp

  config-server:
    enabled: true
    replicas: 1
    component: backend
    serviceAccountName: config-server-sa
    terminationGracePeriodSeconds: 30
    podAnnotations:
      sidecar.istio.io/inject: "false"
      prometheus.io/scrape: "true"
      prometheus.io/port: "8888"
    podSecurityContext:
      <<: *defaultPodSecurityContext
    volumes:
      - name: config-server-logs
        persistentVolumeClaim:
          claimName: config-server-logs-claim
      - name: known-hosts
        configMap:
          name: hosts
      - name: tmp
        emptyDir: {}
    image:
      repository: "registry.***.****.com/mddz/config-server"
      tag: "1.0.0"
    imagePullPolicy: Always
    securityContext: &writableSpringSecurityContext
      runAsUser: 10000
      runAsGroup: 10001
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    ports:
      - name: http
        containerPort: 8888
        protocol: TCP
    envFrom:
      - configMapRef:
          name: config-server-config
    env:
      - name: SPRING_CLOUD_CONFIG_SERVER_GIT_PRIVATE_KEY
        valueFrom:
          secretKeyRef:
            name: my-ssh-key
            key: id_rsa
      - name: ENCRYPT_KEY
        valueFrom:
          secretKeyRef:
            name: encrypt-key-secret
            key: ENCRYPT_KEY
      - name: INSTANCE
        valueFrom:
          fieldRef:
            fieldPath: metadata.name
    resources:
      requests:
        cpu: 100m
        memory: 150Mi
      limits:
        cpu: 300m
        memory: 512Mi
    probes: &configServerProbes
      livenessProbe:
        httpGet:
