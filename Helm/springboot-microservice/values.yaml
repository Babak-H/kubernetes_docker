        valueFrom:
          secretKeyRef:
            name: eureka-pass-secret
            key: eureka-pass
      - name: INSTANCE
        valueFrom:
          fieldRef:
            fieldPath: metadata.name
    resources:
      <<: *smallSpringResources
    probes: &port8081Probes
      livenessProbe:
        httpGet:
          path: /actuator/health/liveness
