      tag: "1.0.0"
    imagePullPolicy: Always
    securityContext:
      <<: *readonlySpringSecurityContext
    ports:
      - name: http
        containerPort: 9999
        protocol: TCP
    envFrom:
      - configMapRef:
          name: cloud-admin-config
    env:
      - name: mddz_EUREKA_USER_PASSWORD
        valueFrom:
          secretKeyRef:
            name: eureka-pass-secret
            key: eureka-pass
      - name: ENCRYPT_KEY
        valueFrom:
          secretKeyRef:
            name: encrypt-key-secret
            key: ENCRYPT_KEY
      - name: INSTANCE
        valueFrom:
          fieldRef:
            fieldPath: metadata.name
    resources:
      requests:
        cpu: 80m
        memory: 150Mi
      limits:
        cpu: 300m
        memory: 512Mi
    probes:
      livenessProbe:
        httpGet:
          path: /actuator/health/liveness
          port: http
        initialDelaySeconds: 20
        periodSeconds: 10
      readinessProbe:
        httpGet:
          path: /actuator/health/readiness
          port: http
        initialDelaySeconds: 10
        periodSeconds: 5
      startupProbe:
        httpGet:
          path: /actuator/health
