        initialDelaySeconds: 10
        periodSeconds: 5
      startupProbe:
        httpGet:
          path: /actuator/health
          port: http
        failureThreshold: 30
        periodSeconds: 5
    volumeMounts:
      - name: config-server-logs
        mountPath: /home/mddz/logs/config-server
        subPathExpr: $(INSTANCE)
      - name: known-hosts
        mountPath: /home/mddz/.ssh/known_hosts
        subPath: known-hosts
      - name: tmp
        mountPath: /tmp

  cloud-admin:
    enabled: true
    replicas: 1
    component: backend
    serviceAccountName: cloud-admin-sa
    terminationGracePeriodSeconds: 30
    podAnnotations:
      sidecar.istio.io/inject: "false"
      prometheus.io/scrape: "true"
      prometheus.io/port: "9999"
    podSecurityContext:
