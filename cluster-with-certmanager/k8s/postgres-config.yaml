apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-deployment
  namespace: dev
spec:
  replicas: 2
  strategy:
   type: RollingUpdate
   rollingUpdate:
    maxSurge: 1 
    maxUnavailable: 1
  selector:
    matchLabels:
      component: postgres
  template:
    metadata:
      labels:
        component: postgres
    spec:
      volumes:
        - name: postgres-storage
          persistentVolumeClaim: 
            claimName: database-persistent-volume-claim
      containers:
      - name: postgres
        image: postgres
        ports:
        - containerPort: 5432
        readinessProbe:
          exec:
          # Check if PostgreSQL can accept connections
          command:
            - /bin/sh
            - -c
            - pg_isready -U admin -d mydb -h 127.0.0.1
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        livenessProbe:
          exec:
            # Check if PostgreSQL process is alive
            command:
              - /bin/sh
              - -c
              - pg_isready -U admin -d mydb -h 127.0.0.1
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts: 
          - name: postgres-storage
            mountPath: /var/lib/postgresql
            subPath: postgres
        env:
          - name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: pgpassword
                key: PGPASSWORD
        securityContext:
          runAsUser: 0
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 400m
            memory: 512Mi

---

apiVersion: v1
kind: Service
metadata:
  name: postgres-cluster-ip-service
  namespace: dev
spec:
  type: ClusterIP
  selector:
    component: postgres
  ports:
  - port: 5432
    targetPort: 5432
